<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OpenUsage</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: grid; place-items: center;
    font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: #0d0f12; color: #e8eaed; padding: 24px;
  }
  main { max-width: 560px; text-align: center; }
  h1 { font-size: 2.4rem; margin: 0 0 .3em; letter-spacing: -0.02em; }
  p { color: #a7adb6; margin: 0 0 1.4em; }
  .btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin: 1.6em 0; }
  a.btn {
    display: inline-block; padding: 10px 20px; border-radius: 10px; text-decoration: none;
    font-weight: 600;
  }
  a.primary { background: #3b82f6; color: #fff; }
  a.ghost { border: 1px solid #2a2f37; color: #e8eaed; }
  a.primary:hover { background: #2f6fe0; }
  a.ghost:hover { border-color: #3b4250; background: #14171c; }
  .foot { font-size: .85rem; color: #6b7280; margin-top: 2em; }
  .foot a { color: #8b93a1; }
</style>
</head>
<body>
  <main>
    <h1>OpenUsage</h1>
    <p>A menu-bar app that tracks usage &amp; spend across Claude, Codex, Cursor, Copilot and more — this Swift fork adds multiple accounts per provider.</p>
    <div class="btns">
      <a class="btn primary" href="https://github.com/lubomir-dlhy/openusage/releases/latest">Download latest</a>
      <a class="btn ghost" href="https://github.com/lubomir-dlhy/openusage">View on GitHub</a>
    </div>
    <p class="foot">This site also hosts the app's Sparkle auto-update feed: <a href="appcast.xml">appcast.xml</a>.</p>
  </main>
</body>
</html>
