name: Sync upstream

# Keeps this fork in step with the project it was forked from — robinebers/openusage.
# On a schedule (and on demand) it merges new upstream commits into a sync branch and
# opens/updates a PR, so a maintainer can review, resolve any conflicts, and merge —
# picking up upstream fixes/features while preserving our fork-specific commits
# (multi-account, fork bundle id, self-hosted updater channel).
#
# Branch layout this assumes:
#   main         — the fork's canonical branch: upstream's Swift codebase + our fork commits
#                  (multi-account, fork bundle id, self-hosted updater channel). Shares history
#                  with upstream, so it is the DEFAULT sync target — merging upstream here keeps
#                  our customizations while pulling in upstream updates.
#   swift-port   — legacy alias kept in sync with main; overridable via base_branch on manual runs.
#   multi-account / tauri-legacy — the old Tauri (TS/Rust) line. It shares NO git history
#                  with upstream's Swift rewrite, so syncing there is impossible; the guard
#                  below no-ops (with a warning) if ever pointed at it.
#
# The file lives on `main` because GitHub only fires *scheduled* workflows from the default
# branch — which is also the branch it syncs into.

on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
  workflow_dispatch:
    inputs:
      base_branch:
        description: "Fork branch to sync upstream into"
        default: main
        required: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: upstream-sync
  cancel-in-progress: false

env:
  UPSTREAM_URL: https://github.com/robinebers/openusage.git
  UPSTREAM_BRANCH: main
  BASE_BRANCH: ${{ github.event.inputs.base_branch || 'main' }}
  SYNC_BRANCH: chore/upstream-sync

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.base_branch || 'main' }}
          fetch-depth: 0
          # A PAT (secrets.SYNC_PAT, with `repo` + `workflow` scopes) lets the sync PR
          # trigger CI and other workflows. Falls back to the default token, in which
          # case the PR still opens but CI won't auto-run on it.
          token: ${{ secrets.SYNC_PAT || secrets.GITHUB_TOKEN }}

      - name: Configure git + fetch upstream
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream "$UPSTREAM_URL"
          git fetch --no-tags upstream "$UPSTREAM_BRANCH"

      - name: Decide whether there is anything to sync
        id: check
        run: |
          if ! git merge-base "upstream/$UPSTREAM_BRANCH" HEAD >/dev/null 2>&1; then
            echo "::warning::'$BASE_BRANCH' shares no history with upstream/$UPSTREAM_BRANCH — nothing to merge (expected for the Tauri branches). Skipping."
            echo "go=false" >> "$GITHUB_OUTPUT"
          elif git merge-base --is-ancestor "upstream/$UPSTREAM_BRANCH" HEAD; then
            echo "'$BASE_BRANCH' already contains all of upstream/$UPSTREAM_BRANCH. Up to date."
            echo "go=false" >> "$GITHUB_OUTPUT"
          elif git ls-remote --exit-code --heads origin "$SYNC_BRANCH" >/dev/null 2>&1 \
               && git fetch --no-tags origin "$SYNC_BRANCH" \
               && git merge-base --is-ancestor "upstream/$UPSTREAM_BRANCH" FETCH_HEAD; then
            echo "An open sync branch already contains this upstream head — not clobbering it. Skipping."
            echo "go=false" >> "$GITHUB_OUTPUT"
          else
            AHEAD=$(git rev-list --count "HEAD..upstream/$UPSTREAM_BRANCH")
            echo "upstream is $AHEAD commit(s) ahead of '$BASE_BRANCH' — syncing."
            echo "ahead=$AHEAD" >> "$GITHUB_OUTPUT"
            echo "go=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Merge upstream into sync branch
        if: steps.check.outputs.go == 'true'
        id: merge
        env:
          HAS_PAT: ${{ secrets.SYNC_PAT != '' }}
        run: |
          git checkout -B "$SYNC_BRANCH" "origin/$BASE_BRANCH"
          if git merge --no-edit "upstream/$UPSTREAM_BRANCH"; then
            echo "conflicts=false" >> "$GITHUB_OUTPUT"
          else
            echo "conflicts=true" >> "$GITHUB_OUTPUT"
            git add -A
            git commit --no-edit -m "merge upstream/$UPSTREAM_BRANCH (CONFLICTS — resolve before merging)"
          fi
          # The default GITHUB_TOKEN cannot push changes under .github/workflows/ (that
          # needs a PAT carrying the `workflow` scope). When no SYNC_PAT is configured,
          # drop upstream's CI changes from the sync so the push succeeds — this also
          # protects the fork's customized pipelines from being overwritten. Port any
          # upstream workflow changes by hand, or add a SYNC_PAT to include them.
          if [ "$HAS_PAT" != "true" ] && ! git diff --quiet "origin/$BASE_BRANCH" HEAD -- .github/workflows; then
            echo "workflows_skipped=true" >> "$GITHUB_OUTPUT"
            rm -rf .github/workflows
            git checkout "origin/$BASE_BRANCH" -- .github/workflows
            git add -A .github/workflows
            git commit -m "chore: keep fork .github/workflows (upstream CI changes excluded — set SYNC_PAT to sync them)"
          fi
          git push -f origin "$SYNC_BRANCH"

      - name: Open / update pull request
        if: steps.check.outputs.go == 'true'
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT || secrets.GITHUB_TOKEN }}
        run: |
          UP_SHA=$(git rev-parse --short "upstream/$UPSTREAM_BRANCH")
          if [ "${{ steps.merge.outputs.conflicts }}" = "true" ]; then
            STATUS="⚠️ **Merge conflicts** were committed with \`<<<<<<<\` markers. Check out \`$SYNC_BRANCH\`, resolve them, and push before merging."
          else
            STATUS="✅ **Clean merge.** Review and merge."
          fi
          if [ "${{ steps.merge.outputs.workflows_skipped }}" = "true" ]; then
            STATUS=$(printf '%s\n\n%s' "$STATUS" "ℹ️ Upstream changes under \`.github/workflows/\` were **excluded** (the default token can't push workflow files). Port them by hand, or add a \`SYNC_PAT\` secret with the \`workflow\` scope to include them.")
          fi
          BODY=$(printf '%s\n\n%s\n\n%s\n\n%s\n' \
            "Automated sync of upstream **robinebers/openusage@$UPSTREAM_BRANCH** (\`$UP_SHA\`) into \`$BASE_BRANCH\`." \
            "Brings in **${{ steps.check.outputs.ahead }}** new upstream commit(s), keeping this fork's own commits on top." \
            "$STATUS" \
            "<sub>Generated by .github/workflows/upstream-sync.yml. If CI didn't run on this PR, add a \`SYNC_PAT\` repo secret (a PAT with \`repo\` + \`workflow\` scopes).</sub>")
          # Best-effort: the sync BRANCH is already pushed (the real deliverable). A
          # fork's built-in GITHUB_TOKEN can't create/edit PRs, so don't fail the job
          # if the PR step is rejected — surface a warning instead. Add a SYNC_PAT
          # secret (repo + workflow scopes) to fully automate PR open/update.
          if gh pr view "$SYNC_BRANCH" --json number >/dev/null 2>&1; then
            gh pr edit "$SYNC_BRANCH" --title "⬆️ Sync upstream ($UP_SHA)" --body "$BODY" \
              || echo "::warning::Branch updated, but couldn't edit the PR (fork GITHUB_TOKEN). The open PR already reflects the new commits. Add SYNC_PAT to automate."
          else
            gh pr create --base "$BASE_BRANCH" --head "$SYNC_BRANCH" \
              --title "⬆️ Sync upstream ($UP_SHA)" --body "$BODY" \
              || echo "::warning::Branch '$SYNC_BRANCH' pushed, but this fork's GITHUB_TOKEN can't open a PR. Open one ($SYNC_BRANCH → $BASE_BRANCH) manually, or add a SYNC_PAT secret to automate."
          fi
