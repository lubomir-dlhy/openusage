name: Sync upstream

# Periodically check robinebers/openusage (upstream) for new changes and open a
# PR merging them into our app branch, so the fork keeps our customizations AND
# picks up upstream updates. Review + merge the PR (resolving any conflicts).
#
# NOTE: requires our branch to share git history with upstream. If the branch was
# founded on an orphaned/shallow base, the guard below no-ops until it's re-based
# onto upstream (see re-foundation step done once by a maintainer).

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

env:
  UPSTREAM_URL: https://github.com/robinebers/openusage.git
  BASE_BRANCH: multi-account
  SYNC_BRANCH: chore/upstream-sync

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.BASE_BRANCH }}
          fetch-depth: 0

      - name: Fetch upstream
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream "$UPSTREAM_URL"
          git fetch upstream main

      - name: Guard — shared history + new commits?
        id: check
        run: |
          if ! git merge-base upstream/main HEAD >/dev/null 2>&1; then
            echo "::warning::No common history with upstream/main — re-found the branch onto upstream before enabling sync. Skipping."
            echo "go=false" >> "$GITHUB_OUTPUT"
          elif git merge-base --is-ancestor upstream/main HEAD; then
            echo "Already up to date with upstream/main."
            echo "go=false" >> "$GITHUB_OUTPUT"
          else
            echo "go=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Merge upstream into sync branch
        if: steps.check.outputs.go == 'true'
        id: merge
        run: |
          git checkout -B "$SYNC_BRANCH" "origin/$BASE_BRANCH"
          if git merge --no-edit upstream/main; then
            echo "conflicts=false" >> "$GITHUB_OUTPUT"
          else
            echo "conflicts=true" >> "$GITHUB_OUTPUT"
            git add -A
            git commit --no-edit -m "merge upstream/main (CONFLICTS — resolve before merging)"
          fi
          git push -f origin "$SYNC_BRANCH"

      - name: Open / update PR
        if: steps.check.outputs.go == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ steps.merge.outputs.conflicts }}" = "true" ]; then
            STATUS="⚠️ **Conflicts** were committed with markers — resolve them before merging."
          else
            STATUS="✅ Clean merge — review and merge."
          fi
          BODY=$(printf 'Automated sync of upstream **robinebers/openusage@main** into `%s`.\n\n%s' "$BASE_BRANCH" "$STATUS")
          if gh pr view "$SYNC_BRANCH" --json number >/dev/null 2>&1; then
            gh pr edit "$SYNC_BRANCH" --body "$BODY"
          else
            gh pr create --base "$BASE_BRANCH" --head "$SYNC_BRANCH" \
              --title "⬆️ Sync upstream changes" --body "$BODY"
          fi
